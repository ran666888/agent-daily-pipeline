<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 日报 — 每日行业动态与实用技巧</title>
<meta name="description" content="每日 AI Agent 行业早报，涵盖最新模型动态、Agent 实用技巧、热门推荐。每天 1 分钟，掌握 AI Agent 最新趋势。" />
<link rel="canonical" href="https://your-domain.com/daily" />
<meta property="og:title" content="AI Agent 日报 — 每日行业动态与实用技巧" />
<meta property="og:description" content="每日 AI Agent 行业早报，涵盖最新模型动态、Agent 实用技巧、热门推荐。" />
<meta name="robots" content="index, follow" />
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--brand:#D40000}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;background:#fff;color:#1a1a1a;line-height:1.6;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.header .badge{background:var(--brand);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.container{max-width:800px;margin:0 auto;padding:32px 24px}
.hero{text-align:center;margin-bottom:40px}
.hero h2{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.hero p{color:#666;font-size:14px}
.stats{display:flex;justify-content:center;gap:24px;margin-top:16px}
.stat{text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--brand)}
.stat-label{font-size:12px;color:#999;margin-top:2px}
.daily-grid{display:grid;grid-template-columns:1fr;gap:16px}
.entry-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:20px;transition:box-shadow .2s}
.entry-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.06)}
.entry-date{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.entry-title{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:8px}
.entry-title a{color:#1a1a1a;text-decoration:none}
.entry-title a:hover{color:var(--brand)}
.entry-meta{margin-bottom:10px}
.tag{display:inline-block;background:#f5f5f5;color:#666;font-size:11px;padding:2px 10px;border-radius:12px;font-weight:500}
.entry-summary{font-size:13px;color:#666;line-height:1.7}
.entry-summary p{margin-bottom:6px}
.footer{text-align:center;padding:40px 24px;color:#999;font-size:12px;border-top:1px solid #eee;margin-top:40px}

/* 移动端适配 */
@media(max-width:600px){
  .container{padding:20px 16px}
  .hero h2{font-size:22px}
  .entry-card{padding:16px}
  .entry-title{font-size:15px}
}
</style>
</head>
<body>

<div class="header">
  <h1>AI Agent 日报</h1>
  <span class="badge">每日更新</span>
</div>

<div class="container">
  <div class="hero">
    <h2>今日 AI Agent 动态</h2>
    <p id="today-date">加载中…</p>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="total-count">-</div>
        <div class="stat-label">已归档期数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="article-count">-</div>
        <div class="stat-label">今日文章</div>
      </div>
    </div>
  </div>

  <div class="daily-grid" id="daily-grid">
    <!-- 文章卡片由脚本动态生成 -->
  </div>
</div>

<div class="footer">
  <p>由 Agent Daily Pipeline 自动生成 · MIT License</p>
  <p style="margin-top:4px;">
    <a href="https://github.com/AmaosAIGC/agent-daily-auto" style="color:#999;text-decoration:none;">⚡ GitHub 开源</a>
  </p>
</div>

<script src="/daily-data.js"></script>
<script>
(function() {
  var grid = document.getElementById('daily-grid');
  var today = new Date();

  function formatDate(str) {
    var d = str.replace(/\\./g, '-');
    return d;
  }

  function getDateLabel(str) {
    var parts = str.replace(/\\./g, '-').split('-');
    if (parts.length < 3) return str;
    return parts[1] + '月' + parts[2] + '日';
  }

  // 按日期分组，取最新
  var byDate = {};
  for (var i = 0; i < articles.length; i++) {
    var a = articles[i];
    if (!byDate[a.date]) byDate[a.date] = [];
    byDate[a.date].push(a);
  }

  var dates = Object.keys(byDate).sort().reverse();
  var latest = dates[0] || '';

  // 更新统计
  document.getElementById('total-count').textContent = dates.length + '期';
  if (latest) {
    document.getElementById('article-count').textContent = byDate[latest].length + '篇';
    document.getElementById('today-date').textContent = '📅 ' + getDateLabel(latest);
  }

  // 渲染卡片
  for (var i = 0; i < articles.length; i++) {
    var a = articles[i];
    var urlMatch = a.body ? a.body.match(/href=['"]([^'"]+)['"]/) : null;
    var articleUrl = urlMatch ? urlMatch[1] : '#';

    var bodyMatch = a.body ? a.body.replace(/<[^>]+>/g, '').substring(0, 280) : '';
    if (bodyMatch.length >= 280) bodyMatch += '…';

    var card = document.createElement('div');
    card.className = 'entry-card';
    card.innerHTML =
      '<div class="entry-date">' + getDateLabel(a.date) + '</div>' +
      '<div class="entry-title"><a href="' + articleUrl + '" target="_blank" rel="noopener">' + a.title + '</a></div>' +
      '<div class="entry-meta"><span class="tag">' + a.tag + '</span></div>' +
      '<div class="entry-summary"><p>' + bodyMatch + '</p></div>';
    grid.appendChild(card);
  }
})();
</script>
</body>
</html>
